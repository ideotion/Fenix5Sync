# Fenix5Sync configuration
# ------------------------
# This is the documented template. On first install, install.sh copies it to
#   ~/.config/fenix5sync/config.yaml
# if no config exists there. Edit that file (not this template) to customise.
#
# All paths may use ~ (expanded to your home dir) and environment variables.
# There are NO hard-coded paths in the code: everything is driven from here.

# ---- Activity acquisition ---------------------------------------------------
# Files of any supported format are imported: FIT, TCX and GPX. This means the
# same pipeline ingests exports from other watches/platforms (Coros, Suunto,
# Wahoo, Polar, Strava, Komoot, phone apps, ...), not just a Fenix 5 over USB.
source:
  # mode: where to read activities from.
  #   auto         -> try `path` hint, then mass-storage mount points, then MTP
  #   mass_storage -> the watch is mounted as a USB drive (look under mountpoints)
  #   mtp          -> mount via MTP (jmtpfs) before reading
  #   path         -> read `path` below; it may be a directory, a single file or
  #                   a .zip, or a device root containing `activity_subdir`
  #   folder       -> a directory of activity files (see `recursive`)
  #   file         -> a single activity file (`path`)
  #   zip          -> a .zip archive of activity files (`path`); extracted safely
  mode: auto

  # Explicit path to a directory, file, .zip, or the device root. Used by
  # path/folder/file/zip modes, and as a fallback hint for auto-detection.
  # Typical when mounted as mass storage: /media/<user>/GARMIN/GARMIN/Activity
  path: ""

  # Extra mountpoint roots to scan during auto-detection (in addition to the
  # usual /media/<user>, /run/media/<user>, /mnt).
  extra_mount_roots: []

  # Directory (relative to the device root) that holds the .FIT activity files.
  activity_subdir: "GARMIN/Activity"

  # Temporary mountpoint used for MTP mode.
  mtp_mountpoint: "~/.cache/fenix5sync/mtp"

  # Descend into subdirectories when scanning a folder/zip/path directory.
  recursive: false

  # Restrict importing to these formats (e.g. ["gpx"]). Empty = all supported
  # formats (fit, tcx, gpx).
  formats: []

# ---- Local storage ----------------------------------------------------------
storage:
  # Root for everything local. Raw FIT files live under <data_dir>/raw,
  # the SQLite DB at <data_dir>/fenix5sync.sqlite by default.
  data_dir: "~/.local/share/fenix5sync/data"
  raw_subdir: "raw"
  db_file: "~/.local/share/fenix5sync/data/fenix5sync.sqlite"

# ---- Export -----------------------------------------------------------------
export:
  # Default output directory for exports (CSV / JSON / GPX / TCX / raw).
  output_dir: "~/.local/share/fenix5sync/exports"
  # Path to the gpsbabel binary used for optional GPX export. If missing,
  # GPX export falls back to a built-in writer (export still works offline).
  gpsbabel_bin: "gpsbabel"

# ---- Dedupe -----------------------------------------------------------------
dedupe:
  # Files are keyed by SHA-256 of their content (not filename). When true,
  # already-imported hashes are skipped on subsequent syncs.
  enabled: true

# ---- Anonymize (optional, opt-in) -------------------------------------------
# Applied ONLY to the copy produced at export/share time -- your stored archive
# stays lossless and is never modified. Turn on per-export (CLI --anonymize, the
# GUI "Anonymize" toggle, or ?anonymize=true) or set enabled: true to always
# anonymize exports. Note: the "raw" export (original file) can't be anonymized.
anonymize:
  enabled: false           # master switch for anonymizing exports
  drop_gps: false          # remove ALL GPS positions
  privacy_radius_m: 0      # null positions within this many metres of start & end
                           #   (e.g. 200 hides home/finish); 0 = off
  fuzz_gps_m: 0            # jitter each remaining position by up to this many m; 0 = off
  strip_device: true       # drop device make/model and serial / unit / ANT ids
  strip_personal: true     # drop user-profile fields (age, weight, gender, ...)
  shift_dates: false       # rebase timestamps to hide when you exercised
                           #   (durations & intervals are preserved)

# ---- Server -----------------------------------------------------------------
server:
  # SECURITY: bind to loopback only. Do not set this to 0.0.0.0.
  host: "127.0.0.1"
  port: 8765
  # Open the browser automatically when launched via the `serve --open` path.
  open_browser: true

# ---- Logging ----------------------------------------------------------------
logging:
  # Directory for dated log files (fenix5sync-YYYY-MM-DD.log).
  log_dir: "~/.local/share/fenix5sync/logs"
  # One of: DEBUG, INFO, WARNING, ERROR
  level: "INFO"
